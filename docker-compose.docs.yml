services:
  docs:
    image: tp_backend_test_local_docs
    container_name: tp_backend_test_local_docs
    build:
      context: .
      dockerfile: ./compose/local/docs/Dockerfile
    env_file:
      - ./.envs/.local/.django
    volumes:
      - /app/.venv
      - ./docs:/docs:z
      - ./config:/app/config:z
      - ./tp_backend_test:/app/tp_backend_test:z
    ports:
      - '9000:9000'
    command: /start-docs
